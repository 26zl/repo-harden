version: 2

project_name: repo-harden

builds:
  - main: ./cmd/repo-harden
    binary: repo-harden
    env: [CGO_ENABLED=0]
    # -trimpath strips local build paths for reproducible, path-free binaries
    flags: [-trimpath]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    # CommitTimestamp (not build time) so the same commit builds byte-identically
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .CommitDate }}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive
    documents:
      - "${artifact}.sbom.json"
