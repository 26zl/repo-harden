version: 2

project_name: repo-harden

builds:
  - main: ./cmd/repo-harden
    binary: repo-harden
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags: [-s -w]

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive
    documents:
      - "${artifact}.sbom.json"
