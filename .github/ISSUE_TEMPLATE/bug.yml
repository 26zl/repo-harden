name: Bug report
description: Report reproducible incorrect behavior
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include tokens, secret values, or private repository data.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output from `repo-harden version`.
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - GitHub.com
        - GitHub Enterprise Server
        - GitLab
        - Gitea
        - Forgejo
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the command and sanitized output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
